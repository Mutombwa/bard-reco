# ==============================================
# Streamlit Configuration
# Optimized for Cloud Deployment (Render & Streamlit Cloud)
# ==============================================

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
maxUploadSize = 200
runOnSave = false
fileWatcherType = "none"

[browser]
gatherUsageStats = false
serverAddress = "bard-reco-42st.onrender.com"
serverPort = 443

[theme]
primaryColor = "#3498db"
backgroundColor = "#ffffff"
secondaryBackgroundColor = "#f0f2f6"
textColor = "#262730"
font = "sans serif"

[runner]
magicEnabled = true
fastReruns = true

[client]
toolbarMode = "minimal"
showErrorDetails = true
